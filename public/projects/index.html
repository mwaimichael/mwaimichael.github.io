<article class="post-single">
    <header class="page-header" style="max-width: 1000px; margin: 0 auto 2rem auto;">
        <h1>🔨 Automated Engineering Portfolio</h1>
        <p style="opacity: 0.8; margin-top: 0.5rem;">Live data stream fetching public repositories directly via the GitHub API.</p>
    </header>

    <div class="projects-dashboard" style="max-width: 1000px; margin: 0 auto; padding: 0 1rem;">
        
        <div class="controls-panel" style="display: flex; flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem; background: var(--code-bg); padding: 1.2rem; border-radius: 8px; border: 1px solid var(--border);">
            <div style="flex: 1; min-width: 260px;">
                <label style="display: block; font-size: 0.8rem; font-weight: bold; margin-bottom: 0.4rem; opacity: 0.8;">SEARCH ENGINE</label>
                <input type="text" id="projectSearch" placeholder="Filter by engine components (Kafka, Airflow, Spark)..." style="width: 100%; padding: 0.6rem; border-radius: 4px; border: 1px solid var(--border); background: var(--theme); color: var(--primary); font-size: 0.9rem;">
            </div>

            <div style="min-width: 220px;">
                <label style="display: block; font-size: 0.8rem; font-weight: bold; margin-bottom: 0.4rem; opacity: 0.8;">CHRONOLOGICAL ORDER</label>
                <select id="dateSort" style="width: 100%; padding: 0.6rem; border-radius: 4px; border: 1px solid var(--border); background: var(--theme); color: var(--primary); font-size: 0.9rem;">
                    <option value="descending">📅 Newest First</option>
                    <option value="ascending">⏳ Oldest First</option>
                </select>
            </div>
        </div>

        <div id="projectsGrid" style="display: flex; flex-direction: column; gap: 2rem;">
            <p id="dashboard-status" style="text-align: center; opacity: 0.6; padding: 4rem 0; font-size: 1.1rem;">Initialising integration array stream from GitHub API...</p>
        </div>

        <div id="paginationDock" style="display: flex; justify-content: center; align-items: center; gap: 0.5rem; margin: 3rem 0 4rem 0; flex-wrap: wrap;"></div>
    </div>
</article>

<script>
    (function() {
        const username = "mwaimichael";
        const itemsPerPage = 6; 
        let currentPage = 1;
        let projectsData = [];

        function initDashboard() {
            const grid = document.getElementById("projectsGrid");
            const searchInput = document.getElementById("projectSearch");
            const sortSelect = document.getElementById("dateSort");
            const paginationDock = document.getElementById("paginationDock");

            
            if (!grid || !sortSelect) {
                setTimeout(initDashboard, 50);
                return;
            }

            
            fetch(`https://api.github.com/users/${username}/repos?per_page=100`)
            .then(res => {
                if (res.status === 403 || res.status === 429) throw new Error("RATE_LIMIT_EXCEEDED");
                return res.json();
            })
            .then(async repos => {
                if (!Array.isArray(repos)) throw new Error("INVALID_PAYLOAD");

                
                const activeRepos = repos.filter(r => {
                    const name = r.name.toLowerCase();
                    return name !== "mwaimichael" && name !== "mwaimichael.github.io";
                });

                
                const fetchPromises = activeRepos.map(repo => {
                    return fetch(`https://api.github.com/repos/${username}/${repo.name}/readme`, {
                        headers: { 'Accept': 'application.vnd.github.html+json' }
                    })
                    .then(res => res.ok ? res.text() : `<p style="opacity:0.5;">No interactive README.md initialized for this codebase yet.</p>`)
                    .then(readmeHTML => {
                        projectsData.push({
                            title: repo.name,
                            url: repo.html_url,
                            createdDate: new Date(repo.created_at),
                            friendlyDate: new Date(repo.created_at).toLocaleDateString('en-US', { month: 'long', year: 'numeric', day: 'numeric' }),
                            summary: repo.description || "No baseline repository description provided.",
                            readme: readmeHTML
                        });
                    })
                    .catch(() => {});
                });

                await Promise.all(fetchPromises);
                renderDashboard(grid, searchInput, sortSelect, paginationDock);
            })
            .catch(err => {
                if (err.message === "RATE_LIMIT_EXCEEDED") {
                    grid.innerHTML = `
                        <div style="text-align: center; padding: 4rem 1rem; border: 1px dashed var(--border); border-radius: 8px; background: var(--code-bg);">
                            <p style="font-size: 1.2rem; color: var(--primary); margin-bottom: 0.5rem;">🛑 GitHub API Rate Limit Exceeded</p>
                            <p style="opacity: 0.7; max-width: 500px; margin: 0 auto; font-size: 0.95rem;">
                                GitHub limits unauthenticated local requests. Your data pipelines are fine, but your local IP is temporarily throttled.
                            </p>
                        </div>`;
                } else {
                    grid.innerHTML = `<p style="text-align: center; color: var(--primary); padding: 4rem 0;">Error establishing real-time network handshake with GitHub.</p>`;
                }
                console.error(err);
            });

            
            searchInput.addEventListener("input", () => {
                currentPage = 1;
                renderDashboard(grid, searchInput, sortSelect, paginationDock);
            });
            sortSelect.addEventListener("change", () => {
                currentPage = 1;
                renderDashboard(grid, searchInput, sortSelect, paginationDock);
            });
        }

        function renderDashboard(grid, searchInput, sortSelect, paginationDock) {
            let filtered = [...projectsData];

            
            const query = searchInput.value.toLowerCase().trim();
            if (query !== "") {
                filtered = filtered.filter(p => 
                    p.title.toLowerCase().includes(query) || 
                    p.summary.toLowerCase().includes(query) || 
                    p.readme.toLowerCase().includes(query)
                );
            }

            
            if (sortSelect.value === "descending") {
                filtered.sort((a, b) => b.createdDate - a.createdDate);
            } else {
                filtered.sort((a, b) => a.createdDate - b.createdDate);
            }

            
            const totalItems = filtered.length;
            const totalPages = Math.ceil(totalItems / itemsPerPage);
            
            if (currentPage > totalPages) currentPage = 1;
            if (currentPage < 1) currentPage = 1;

            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const paginatedItems = filtered.slice(startIndex, endIndex);

            
            grid.innerHTML = "";
            if (paginatedItems.length === 0) {
                grid.innerHTML = `<p style="text-align: center; opacity: 0.6; padding: 4rem 0;">No repositories match your search criteria.</p>`;
                paginationDock.innerHTML = "";
                return;
            }

            paginatedItems.forEach(p => {
                const block = document.createElement("div");
                block.style.background = "var(--code-bg)";
                block.style.border = "1px solid var(--border)";
                block.style.borderRadius = "8px";
                block.style.padding = "2rem";
                block.style.textAlign = "left";

                block.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 0.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; margin-bottom: 1.5rem;">
                        <h2 style="margin: 0; font-size: 1.6rem;"><a href="${p.url}" target="_blank" style="color: var(--primary); text-decoration: none;">📦 ${p.title}</a></h2>
                        <span style="font-size: 0.85rem; opacity: 0.6; font-family: monospace; margin-top: 0.5rem;">Created: ${p.friendlyDate}</span>
                    </div>
                    <div style="font-size: 1.05rem; line-height: 1.5; margin-bottom: 2rem; opacity: 0.8;">
                        ${p.summary}
                    </div>
                    <details style="background: var(--theme); border: 1px solid var(--border); border-radius: 6px; padding: 1rem; cursor: pointer;">
                        <summary style="font-weight: bold; font-size: 0.9rem; color: var(--primary); outline: none;">🔍 View Full Documentation (README.md)</summary>
                        <div class="github-readme post-content" style="margin-top: 1.5rem; cursor: default; font-size: 0.95rem; border-top: 1px solid var(--border); padding-top: 1.5rem;">
                            ${p.readme}
                        </div>
                    </details>
                `;
                grid.appendChild(block);
            });

            
            renderPaginationControls(grid, searchInput, sortSelect, paginationDock, totalPages);
        }

        function renderPaginationControls(grid, searchInput, sortSelect, paginationDock, totalPages) {
            paginationDock.innerHTML = "";
            if (totalPages <= 1) return; 

            const prevBtn = document.createElement("button");
            prevBtn.innerText = "◀ Prev";
            prevBtn.disabled = currentPage === 1;
            applyNavButtonStyles(prevBtn, currentPage === 1);
            prevBtn.addEventListener("click", () => {
                currentPage--;
                renderDashboard(grid, searchInput, sortSelect, paginationDock);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
            paginationDock.appendChild(prevBtn);

            for (let i = 1; i <= totalPages; i++) {
                const pageBtn = document.createElement("button");
                pageBtn.innerText = i;
                const isActive = i === currentPage;
                applyNavButtonStyles(pageBtn, false, isActive);
                pageBtn.addEventListener("click", () => {
                    currentPage = i;
                    renderDashboard(grid, searchInput, sortSelect, paginationDock);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });
                paginationDock.appendChild(pageBtn);
            }

            const nextBtn = document.createElement("button");
            nextBtn.innerText = "Next ▶";
            nextBtn.disabled = currentPage === totalPages;
            applyNavButtonStyles(nextBtn, currentPage === totalPages);
            nextBtn.addEventListener("click", () => {
                currentPage++;
                renderDashboard(grid, searchInput, sortSelect, paginationDock);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
            paginationDock.appendChild(nextBtn);
        }

        function applyNavButtonStyles(btn, isDisabled, isActive = false) {
            btn.style.padding = "0.5rem 0.9rem";
            btn.style.borderRadius = "4px";
            btn.style.border = "1px solid var(--border)";
            btn.style.cursor = isDisabled ? "not-allowed" : "pointer";
            btn.style.fontSize = "0.9rem";
            btn.style.fontFamily = "monospace";
            
            if (isActive) {
                btn.style.background = "var(--primary)";
                btn.style.color = "var(--theme)";
                btn.style.fontWeight = "bold";
            } else {
                btn.style.background = isDisabled ? "transparent" : "var(--code-bg)";
                btn.style.color = "var(--primary)";
                btn.style.opacity = isDisabled ? "0.3" : "1";
            }
        }

        
        if (document.readyState === "complete" || document.readyState === "interactive") {
            initDashboard();
        } else {
            document.addEventListener("DOMContentLoaded", initDashboard);
        }
    })();
</script>

    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener("click", function (e) {
            e.preventDefault();
            var id = this.getAttribute("href").substr(1);
            if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                document.querySelector(`[id='${decodeURIComponent(id)}']`).scrollIntoView({
                    behavior: "smooth"
                });
            } else {
                document.querySelector(`[id='${decodeURIComponent(id)}']`).scrollIntoView();
            }
            if (id === "top") {
                history.replaceState(null, null, " ");
            } else {
                history.pushState(null, null, `#${id}`);
            }
        });
    });

</script>

        const scrollThreshold = window.innerHeight;
        if (document.body.scrollTop > scrollThreshold || document.documentElement.scrollTop > scrollThreshold) {
            toplink.classList.remove("hidden");
        } else {
            toplink.classList.add("hidden");

    };

</script>
